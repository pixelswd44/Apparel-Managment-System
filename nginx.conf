# Nginx config for Apparel CRM
# Place this file at: /etc/nginx/sites-available/apparel-crm
# Then: sudo ln -s /etc/nginx/sites-available/apparel-crm /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect HTTP → HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;

    # ── Static frontend files ─────────────────────────────────────────────────
    root /var/www/apparel-crm/client/dist;
    index index.html;

    # React Router — serve index.html for all frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API proxy ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50M;
    }

    # ── Uploaded files (logos, images) ────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        client_max_body_size 50M;
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}

